    <!-- CONTACT SECTION -->
    <section class="section">
        <div class="container">
            <h2 class="section-title">Hubungi Kami</h2>
            <div class="contact-grid">
                <!-- Info Kontak & Social Media -->
                <div class="contact-info">
                    <h3 style="margin-bottom: 20px;">Sambel Botol Kita</h3>
                    <p><i class="fa-solid fa-location-dot"></i> Jl. Pemuda IV, Sungai Pinang, Samarinda</p>
                    <p><i class="fa-solid fa-phone"></i> 081346560045</p>
                    <p><i class="fa-solid fa-envelope"></i> sambelbotolkita@gmail.com</p>
                    
                    <div style="margin-top: 30px;">
                        <p>
                            <i class="fa-brands fa-instagram" style="color: #E1306C; font-size: 1.5rem;"></i> 
                            <a href="https://www.instagram.com/sambelbotolkita?igsh=MTFpODd2aHdpdDM4Mw==" target="_blank" style="color: var(--text-dark); text-decoration: none; font-weight: 600;">@sambelbotolkita</a>

                <!-- Formulir WhatsApp -->
                <form class="contact-form" id="msgForm">
                    <input type="text" id="formNama" placeholder="Nama Anda" required>
                    <input type="email" id="formEmail" placeholder="Email Anda (Opsional)">
                    <textarea id="formPesan" rows="5" placeholder="Tulis pesan Anda di sini..." required></textarea>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Kirim Pesan ke WhatsApp</button>
                </form>
